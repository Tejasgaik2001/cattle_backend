version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mycowfarm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mycowfarm
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend service (optional - for full containerized deployment)
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: mycowfarm-api
  #   restart: unless-stopped
  #   ports:
  #     - '3000:3000'
  #   environment:
  #     - DB_HOST=postgres
  #     - DB_PORT=5432
  #     - DB_USERNAME=postgres
  #     - DB_PASSWORD=postgres
  #     - DB_DATABASE=mycowfarm
  #   depends_on:
  #     - postgres

volumes:
  postgres_data:
